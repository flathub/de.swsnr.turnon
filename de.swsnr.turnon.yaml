id: de.swsnr.turnon
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: de.swsnr.turnon
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - pip-build.json
  - name: turnon
    buildsystem: simple
    sources:
      - type: git
        url: https://codeberg.org/swsnr/turnon.git
        tag: v3.0.4
        commit: 9c5eb1da1e359253e17b7d760f906b54d286f27c
    build-commands:
      # Crudely assert that we're not on a -dev version
      - grep version pyproject.toml | grep -qv -- '[.-]dev'
      - pip3 install --verbose --exists-action=i --no-index --no-deps --prefix=${FLATPAK_DEST} --no-build-isolation .
      - glib-compile-schemas /app/share/glib-2.0/schemas
