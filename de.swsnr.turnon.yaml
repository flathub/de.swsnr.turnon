id: de.swsnr.turnon
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: de.swsnr.turnon
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
modules:
  - name: turnon
    buildsystem: simple
    sources:
      - type: git
        url: https://codeberg.org/swsnr/turnon.git
        tag: "v2.9.6"
        commit: "e96807b6551ebe8a46165496ddd81919b24d1dbe"
      - de.swsnr.turnon.cargo-sources.json
    build-commands:
      - install -Dm644 cargo/config .cargo/config.toml
      - just APPID=de.swsnr.turnon compile
      - cargo build --frozen --release --verbose
      - just APPID=de.swsnr.turnon DESTPREFIX=/app install
